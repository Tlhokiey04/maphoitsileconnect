{% extends 'reports/base.html' %}
{% block title %}Login — MaphoitsileConnect{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card mt-4">
      <div class="card-header" style="background:#1a3a6b; color:#fff;">
        <i class="bi bi-person-lock me-2"></i>Login to MaphoitsileConnect
      </div>
      <div class="card-body p-4">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control"
                   placeholder="Enter your username" required/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control"
                   placeholder="Enter your password" required/>
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </button>
          </div>
        </form>
        <hr/>
        <p class="text-center text-muted mb-0" style="font-size:0.9rem;">
          Don't have an account?
          <a href="{% url 'register' %}" class="fw-semibold"
             style="color:#1a3a6b;">Register here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
